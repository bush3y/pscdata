services:
  backend:
    build:
      context: ./backend
      target: production
    volumes:
      - psc_data:/data
    environment:
      DUCKDB_PATH: /data/psc.duckdb
      CKAN_BASE_URL: https://open.canada.ca/data/en/api/3/action
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "8484:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  psc_data:
