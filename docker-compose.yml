services:
  backend:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend:/app
      - psc_data:/data
    environment:
      DUCKDB_PATH: /data/psc.duckdb
      CKAN_BASE_URL: https://open.canada.ca/data/en/api/3/action
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  psc_data:
